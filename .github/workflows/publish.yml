name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish, usually a release tag like v0.3.2"
        required: true
        type: string

jobs:
  publish:
    name: Build and publish package
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentclaimguard
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Validate release tag input
        run: |
          case "${{ inputs.ref }}" in
            v*) ;;
            *)
              echo "Publish ref must be a release tag like v0.3.2."
              exit 1
              ;;
          esac

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install release tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[release]"

      - name: Build distributions
        run: |
          python -m build

      - name: Check distributions
        run: |
          python -m twine check dist/*

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

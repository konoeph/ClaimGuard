name: generic_numeric
version: "0.1"

claim_types:
  numeric_conclusion:
    required_evidence:
      - type: source_fact
        min_count: 2
    required_tool_results:
      - calculator
    forbidden:
      - numeric_claim_without_tool
    fallback:
      verdict: insufficient_evidence
      reason: Numeric conclusions require source facts and calculation results.

